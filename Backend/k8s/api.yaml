apiVersion: apps/v1
kind: Deployment

metadata:
  name: api-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: api

  template:
    metadata:
      labels:
        app: api

    spec:
      containers:
        - name: api
          image: scale-ingestion-system

          ports:
            - containerPort: 8000

          env:
            - name: DATABASE_URL
              value: postgresql://postgres:Machone%401@postgres-service:5432/postgres

            - name: REDIS_URL
              value: redis://redis-service:6379/0

          volumeMounts:
            - name: shared-storage
              mountPath: /shared

      volumes:
        - name: shared-storage
          persistentVolumeClaim:
            claimName: shared-pvc

---
apiVersion: v1
kind: Service

metadata:
  name: api-service

spec:
  selector:
    app: api

  ports:
    - port: 8000
      targetPort: 8000

  type: LoadBalancer
